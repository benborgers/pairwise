# Deploy the rendezvous worker (server/) whenever it changes on main.
#
# Required repository secret:
#   CLOUDFLARE_API_TOKEN  Cloudflare API token with the "Edit Cloudflare
#                         Workers" template permissions
name: Deploy Server

on:
  push:
    branches: [main]
    paths: ["server/**"]

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy worker
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
